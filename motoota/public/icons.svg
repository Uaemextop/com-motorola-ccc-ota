    <rect x="3" y="14" width="18" height="7" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="7" cy="6.5" r="0.75" fill="currentColor" stroke="none"/>
