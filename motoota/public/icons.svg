<svg xmlns="http://www.w3.org/2000/svg">
  <!-- MotoOTA Icon Sprite Sheet -->

  <!-- icon-logo: Shield with download arrow brand mark -->
  <symbol id="icon-logo" viewBox="0 0 24 24">
    <path d="M12 2L4 6v6c0 5.25 3.4 10.15 8 11.4 4.6-1.25 8-6.15 8-11.4V6l-8-4z"
          fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M12 8v6m0 0l-2.5-2.5M12 14l2.5-2.5M8.5 17h7"
          fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- icon-search: Magnifying glass -->
  <symbol id="icon-search" viewBox="0 0 24 24">
    <circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M16 16l4.5 4.5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- icon-download: Download arrow with tray -->
